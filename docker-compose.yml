services:
  michel-palareff:
    build: .
    container_name: michel-palareff
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "6767:80"
    networks:
      michel-net:

  api:
    build: ./server
    container_name: michel-palareff-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_CLIENT: ${DB_CLIENT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    networks:
      michel-net:
        ipv4_address: 172.28.0.10

networks:
  michel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
