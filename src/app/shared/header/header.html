<header class="app-header">
  <a routerLink="/feed" class="logo">
    <img src="logo.png" alt="Michel Palareff" class="logo-mark" />
    <span>Michel Palareff</span>
  </a>
  <div class="actions">
    @if (auth.username(); as username) {
      <span class="username">{{ username }}</span>
    }
    <button type="button" class="logout" (click)="logout()">Se déconnecter</button>
  </div>
</header>
