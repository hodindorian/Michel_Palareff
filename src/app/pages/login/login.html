<main class="login">
  <section class="login-card">
    <p class="kicker">🏆 Le musée des refs</p>
    <h1>Michel Palareff</h1>
    <p class="tagline">Vous avez pas la ref ? Maintenant si.</p>

    <form (ngSubmit)="submit()" class="login-form">
      <label>
        <span>Pseudo</span>
        <input
          type="text"
          name="username"
          autocomplete="username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          placeholder="michel"
          autofocus
        />
      </label>

      <label>
        <span>Mot de passe</span>
        <input
          type="password"
          name="password"
          [autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="••••••••"
        />
      </label>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()">
        @if (mode() === 'login') {
          Entrer dans la légende
        } @else {
          Créer mon compte
        }
      </button>
    </form>

    <button type="button" class="mode-toggle" (click)="toggleMode()">
      @if (mode() === 'login') {
        Pas encore de compte ? Crée-le ici.
      } @else {
        Déjà un compte ? Connecte-toi.
      }
    </button>
  </section>
</main>
