server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Ref videos/photos rarely change once added, cache them aggressively.
    location /videos/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /pictures/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Angular's build hashes JS/CSS filenames, so a changed file always gets a
    # new URL — safe to cache these forever.
    location ~* \.(?:js|css|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Data files (manifest, meta) keep the same filename across builds even
    # when their content changes — never let browsers cache these, otherwise
    # new/edited refs silently stop showing up until the user clears cache.
    location ~* \.json$ {
        add_header Cache-Control "no-cache";
    }

    # Auth API, proxied to the api container so cookies stay same-origin.
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular router fallback: index.html itself must never be cached, since
    # it's the only thing referencing the current build's hashed bundle names.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
